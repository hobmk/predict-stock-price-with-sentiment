language: "ko"

reviews:
  profile: "chill"
  auto_review:
    enabled: true
    base_branches: ["main"]
  path_filters:
    - "!data/**"
    - "!**/*.npz"
    - "!**/*.parquet"
    - "!**/*.pt"
    - "!**/__pycache__/**"
    - "!.venv/**"
    - "!.idea/**"
    - "!.vscode/**"
  tools:
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    actionlint:
      enabled: true
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

knowledge_base:
  code_guidelines:
    enabled: true