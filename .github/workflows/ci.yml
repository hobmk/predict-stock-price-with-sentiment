# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@<checkout-v4-commit-sha> # pin to commit SHA

      - name: Set up Python
        uses: actions/setup-python@<setup-python-v5-commit-sha> # pin to commit SHA
        with:
          python-version: "3.11.5"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow yfinance

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check scripts

      - name: Smoke test preprocess
        run: |
          python scripts/preprocess.py --help
